name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
      - claude/supercycle-build-deploy-M1Zu1

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: |
          if [ "${{ github.ref }}" = "refs/heads/claude/supercycle-build-deploy-M1Zu1" ]; then
            VITE_BASE=/supercycle/ npm run build
          else
            npm run build
          fi

      - name: Verify build output
        run: |
          ls -la dist/
          test -f dist/index.html || (echo "ERROR: dist/index.html not found" && exit 1)

      - name: Prepare deployment directory
        run: |
          if [ "${{ github.ref }}" = "refs/heads/claude/supercycle-build-deploy-M1Zu1" ]; then
            mkdir -p deploy/supercycle
            cp -r dist/* deploy/supercycle/
            echo "Deployed to subdirectory: /supercycle/"
          else
            mkdir -p deploy
            cp -r dist/* deploy/
            echo "Deployed to root"
          fi
          ls -la deploy/

      - uses: actions/upload-pages-artifact@v3
        id: upload
        with:
          path: deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
