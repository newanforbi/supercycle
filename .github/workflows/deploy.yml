name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
      - claude/supercycle-design-tokens

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        run: |
          if [ "${{ github.ref }}" = "refs/heads/claude/supercycle-build-deploy-M1Zu1" ]; then
            VITE_BASE=/supercycle/ npm run build
          else
            npm run build
          fi
      - name: Prepare deployment directory
        run: |
          if [ "${{ github.ref }}" = "refs/heads/claude/supercycle-build-deploy-M1Zu1" ]; then
            mkdir -p deploy/supercycle
            cp -r dist/* deploy/supercycle/
          else
            mkdir -p deploy
            cp -r dist/* deploy/
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: deploy
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
